<!doctype html>
<html lang="en">
<head>
  <title>EduTrack</title>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <!-- Fonts and icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:400,700|Material+Icons">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <!-- Material Kit CSS -->
  <link href="assets/css/material-kit.css?v=3.0.0" rel="stylesheet" />
  <link rel="stylesheet" href="/Public/CSS/public.css">
</head>

<body style="background-color: rgb(174, 173, 173);">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg position-absolute top-0 z-index-3 w-100 shadow-none my-3 navbar-transparent">
    <div class="container">
      <a class="navbar-brand text-white" href="/Admin/dashboard.html">
        <img src="/Public/Images/New-Edutrack-Image.png" alt="EduTrack Logo">
      </a>
      <button class="navbar-toggler shadow-none ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navigation"
        aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon mt-2">
          <span class="navbar-toggler-bar bar1"></span>
          <span class="navbar-toggler-bar bar2"></span>
          <span class="navbar-toggler-bar bar3"></span>
        </span>
      </button>
      <div class="collapse navbar-collapse w-100 pt-3 pb-2 py-lg-0 ms-lg-12 ps-lg-5" id="navigation">
        <ul class="navbar-nav navbar-nav-hover ms-auto">
          <li class="nav-item mx-2 ms-lg-6">
            <a class="nav-link ps-2 d-flex align-items-center" href="/Admin/uploads.html">
              <i class="material-icons opacity-6 me-2 text-md">dashboard</i> Uploads
            </a>
          </li>
          <li class="nav-item mx-2">
            <a class="nav-link ps-2 d-flex align-items-center" href="/Admin/downloads.html">
              <i class="material-icons opacity-6 me-2 text-md">view_day</i> Downloads
            </a>
          </li>
          <li class="nav-item mx-2">
            <a class="nav-link ps-2 d-flex align-items-center" href="/Admin/resources.html">
              <i class="material-icons opacity-6 me-2 text-md">article</i> Resources
            </a>

          <li class="nav-item ms-lg-auto my-auto ms-3 ms-lg-0 mt-2 mt-lg-0">
            <a href="/Admin/personal.html" class="btn btn-sm bg-gradient-primary mb-0 me-1 mt-2 mt-md-0">Personal info</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header min-vh-80" style="background-image: url('/Public/Images/Edutrack-dashboard-background-image.png'); background-size: cover; background-position: center;">
    <span class="mask bg-gradient-dark opacity-6"></span>
    <div class="container text-center">
      <h1 class="text-white mt-7">EduTrack Dashboard</h1>
      <h3 class="text-white">Find out about latest news on campus</h3>
    </div>
  </div>
  <main class="main-style">
    <h1 class="resources-header">Personal Infomation</h1>
    <div class="personal-info">
        <div class="personal-img">
            <img src="/Public/Images/Profile-picture.jpg" alt="face-img" width="200">
        </div>
        <div class="personal-input-info">
            <input type="text" class="name-info personal-field" placeholder="Display Name">
            <input type="text" class="surname-info personal-field" placeholder="Display Surname">
            <input type="text" class="age personal-field" placeholder="Display Age">
            <input type="text" class="username-info personal-field" readonly placeholder="Display Username">
            <input type="password" class="password-info personal-field" placeholder="Display Password">
        </div>
        <div class="edit-info-button">
            <button class="edit-info">Edit Info</button>
        </div>
    </div>

   
     
  </main>
  <!-- Footer -->
  <footer class="custom-footer pt-3 mt-5">
    <div class="custom-footer-container text-center">
      <div class="custom-footer-row">
      </div>
      <p class="custom-footer-text">
        All rights reserved. Copyright © 
        <script>document.write(new Date().getFullYear())</script>
        EduTrack.
      </p>
    </div>
  </footer>
  <script src="/Admin/personal.js"></script>
</body>
</html>
