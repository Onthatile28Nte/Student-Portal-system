<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/Public/CSS/public.css">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; }
    .form-container { max-width: 350px; margin-top: 50px; }
  </style>
</head>
<body class="bg-light" style="background-color: rgb(216, 213, 213); background:url(/Public/Images/Edutrack-dashboard-background-image.png); backdrop-filter: blur(5px);background-repeat: no-repeat; background-size: cover;">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light navbar-spacing">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="/Public/Images/New-Edutrack-Image.png" alt="Logo" width="100" height="100" class="d-inline-block align-text-top logo-img">
      </a>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/index.html" style="font-size: x-large;">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" style="font-size: x-large;">Contact Us</a>
          </li>
        </ul>
        <div>
          <ul class="ul-index">
            <li class="login"><a href="/Public/login.html" class="login-link">Login</a></li>
            <li class="register"><a href="/Public/register.html" class="register-link">Register</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <!-- Form -->
  <div class="d-flex justify-content-center align-items-center form-container mx-auto">
    <div class="card shadow-lg p-4 w-100">
      <h3 class="text-center mb-4">Register</h3>
      <h6 class="create-account text-center mb-3">Create an account</h6>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Create password</label>
          <input type="password" class="form-control" id="password">
        </div>
        <div class="mb-3">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirm-password">
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
        <a class="not-registered d-block text-center mt-2" href="/Public/login.html">Already have an account?</a>
      </form>
    </div>
  </div>
       <footer>
        <h5 class="footer-header">Edutrack Campus Online | &copy; 2025 </h5>
    </footer> 

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/Public/Javascript/register.js"></script>
</body>
</html>
