<!doctype html>
<html lang="en">
<head>
  <title>EduTrack | Contact</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Icons & Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons" rel="stylesheet">

  <link rel="stylesheet" href="/Public/CSS/public.css">
</head>

<body class="contact-body">

  <!-- NAVBAR -->
  <nav class="contact-navbar">
    <a href="/index.html"><img src="/Public/Images/New-Edutrack-Image.png" alt="EduTrack Logo"></a>
  </nav>

  <!-- HEADER -->
  <header class="contact-header">
    <div class="contact-header-content">
      <h1>Contact EduTrack</h1>
      <h3>We’re here to help you</h3>
    </div>
  </header>

  <main class="contact-main-section">
    <h1 class="contact-title">Contact Us</h1>

    <form class="contact-form">
      <fieldset class="contact-fieldset">
        <h2 class="contact-form-header">Fill In Your Details</h2>

        <div class="contact-input-group">
          <input type="text" placeholder="Enter Name">
          <input type="text" placeholder="Enter Surname">
          <input type="email" placeholder="Enter Email">
          <textarea rows="4" placeholder="Type Your Inquiry Here"></textarea>

          <button class="contact-submit-btn">Submit</button>
        </div>
      </fieldset>
    </form>

    <div class="contact-details">
      <h3>Contact Details</h3>
      <p><strong>Campus Support Desk:</strong> 011 234 532 1122</p>
      <p><strong>Email:</strong> edutrack@campus.co.za</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="contact-footer">
    <p>
      All rights reserved. © 
      <script>document.write(new Date().getFullYear())</script> EduTrack.
    </p>
  </footer>

  <script src="/contact.js"></script>
</body>
</html>
